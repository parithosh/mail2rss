name: Build and publish Docker image

# Triggers only on git tag pushes. PRs (from forks or otherwise) cannot fire
# this workflow, and forks do not have access to repo secrets. Only users with
# write access to parithosh/mail2rss can push tags here.
on:
  push:
    tags:
      - "*"

# Lock down the GITHUB_TOKEN: this workflow only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and push
    runs-on: ubuntu-latest
    # Defense in depth: don't run this in a fork even if somehow triggered.
    if: github.repository == 'parithosh/mail2rss'
    permissions:
      contents: read
    steps:
      # All third-party actions pinned to commit SHAs to defend against a
      # major-version tag being moved to a malicious commit upstream.
      # Dependabot (see .github/dependabot.yml) keeps these current.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: parithoshj/mail2rss
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
