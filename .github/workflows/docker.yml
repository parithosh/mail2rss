name: Build and publish Docker image

# Triggers only on git tag pushes. PRs (from forks or otherwise) cannot fire
# this workflow, and forks do not have access to repo secrets. Only users with
# write access to parithosh/mail2rss can push tags here.
on:
  push:
    tags:
      - "*"

# Lock down the GITHUB_TOKEN: this workflow only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and push
    runs-on: ubuntu-latest
    # Defense in depth: don't run this in a fork even if somehow triggered.
    if: github.repository == 'parithosh/mail2rss'
    permissions:
      contents: read
    steps:
      # All third-party actions pinned to commit SHAs to defend against a
      # major-version tag being moved to a malicious commit upstream.
      # Dependabot (see .github/dependabot.yml) keeps these current.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: parithoshj/mail2rss
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
